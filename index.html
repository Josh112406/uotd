<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UOTD - Ulam Of The Day</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">Ulam Of The Day</p>
          <h1>Cook smart, spend less, eat better.</h1>
          <p class="sub">PH-focused ulam suggestions based on your pantry, budget, and kcal targets.</p>
        </div>
        <div class="status" id="authStatus">Not signed in</div>
      </header>

      <section class="card">
        <h2>Sign in</h2>
        <div class="grid">
          <input id="email" type="email" placeholder="Email" />
          <input id="password" type="password" placeholder="Password" />
        </div>
        <div class="row">
          <button id="btnSignUp">Sign up</button>
          <button id="btnSignIn">Sign in</button>
          <button id="btnSignOut" class="ghost">Sign out</button>
        </div>
      </section>

      <section class="card">
        <h2>Profile</h2>
        <div class="grid">
          <input id="displayName" placeholder="Display name" />
          <input id="budget" type="number" placeholder="Budget per meal (PHP)" />
          <input id="kcal" type="number" placeholder="Kcal target per meal" />
          <input id="dietTags" placeholder="Diet tags (comma separated)" />
        </div>
        <button id="btnSaveProfile">Save profile</button>
      </section>

      <section class="card">
        <h2>Pantry</h2>
        <div class="grid">
          <input id="pantryName" placeholder="Ingredient name" />
          <input id="pantryQty" type="number" placeholder="Quantity" />
          <input id="pantryUnit" placeholder="Unit (g, ml, pcs)" />
        </div>
        <div class="row">
          <button id="btnAddPantry">Add ingredient</button>
          <button id="btnRefreshPantry" class="ghost">Refresh</button>
        </div>
        <ul id="pantryList" class="list"></ul>
      </section>

      <section class="card">
        <h2>Search</h2>
        <div class="grid">
          <input id="ingredientSearch" placeholder="Ingredients (comma separated)" />
          <input id="dishSearch" placeholder="Dish name" />
        </div>
        <div class="row">
          <button id="btnSearch">Search by ingredients</button>
          <button id="btnReverse" class="ghost">Reverse search</button>
        </div>
        <div id="searchResults" class="results"></div>
      </section>

      <section class="card">
        <h2>Suggestions</h2>
        <div class="row">
          <select id="suggestMode">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
          <button id="btnSuggest">Get suggestions</button>
        </div>
        <div id="suggestions" class="results"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
